ï»؟# .github/workflows/daily-ops.yml
name: Daily Ops Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 - News crawler
    - cron: '30 0 * * *'  # UTC 00:30 - Tool discovery
    - cron: '45 0 * * *'  # UTC 00:45 - Trend agent (post-crawl)
    - cron: '45 4 * * *'  # UTC 04:45 - Trend agent
    - cron: '45 8 * * *'  # UTC 08:45 - Trend agent (intraday surge check)
    - cron: '45 12 * * *' # UTC 12:45 - Trend agent
    - cron: '45 16 * * *' # UTC 16:45 - Trend agent (intraday surge check)
    - cron: '45 20 * * *' # UTC 20:45 - Trend agent
    - cron: '0 2 * * *'   # UTC 02:00 - SEO articles
    - cron: '0 6 * * *'   # UTC 06:00 - SEO backlog drain
    - cron: '0 12 * * *'  # UTC 12:00 - SEO backlog drain
    - cron: '0 18 * * *'  # UTC 18:00 - SEO backlog drain
    - cron: '30 2 * * *'  # UTC 02:30 - Submit new URLs to IndexNow
    - cron: '30 6 * * *'  # UTC 06:30 - Submit new URLs to IndexNow
    - cron: '30 12 * * *' # UTC 12:30 - Submit new URLs to IndexNow
    - cron: '30 18 * * *' # UTC 18:30 - Submit new URLs to IndexNow
    - cron: '0 3 * * *'   # UTC 03:00 - Compare articles
    - cron: '0 20 * * *'   # UTC 20:00 - Analytics collection (delayed to allow GA4 to finalize previous day's data)
    - cron: '10 20 * * *'  # UTC 20:10 - Lookback agent (snapshot aging pages)
    - cron: '20 20 * * *'  # UTC 20:20 - Monitor agent (after analytics, before strategy)
    - cron: '30 20 * * *'  # UTC 20:30 - Strategy engine
    - cron: '35 20 * * *'  # UTC 20:35 - Traffic growth controller
    - cron: '40 20 * * *'  # UTC 20:40 - Self-iteration agent
    - cron: '0 21 * * *'   # UTC 21:00 - Daily report
    - cron: '0 21 * * 1'   # UTC 21:00 Monday - Weekly report
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - news
          - tools
          - trend
          - seo
          - compare
          - analytics
          - lookback
          - monitor
          - strategy
          - growth
          - indexnow
          - self
          - report
          - weekly

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
  INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.jilo.ai' }}
  PV_GROWTH_TARGET: "0.20"

jobs:
  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 1: News Crawler éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  news-crawler:
    name: "é¦ƒو‘ھ News Crawler"
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'news'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python rss_news_crawler.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 1b: Trend Agent éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  # Forward loop: pulls RSS + HN + Reddit live, detects surging topics
  # (multi-source OR high-engagement), enqueues high-priority
  # generate_seo_content while the topic is hot. Runs 3x/day, standalone
  # (fetches its own engagement signals, not gated by the daily crawl).
  trend-agent:
    name: "é¦ƒوگ± Trend Agent"
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '45 0 * * *' || github.event.schedule == '45 4 * * *' || github.event.schedule == '45 8 * * *' || github.event.schedule == '45 12 * * *' || github.event.schedule == '45 16 * * *' || github.event.schedule == '45 20 * * *')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'trend'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python trend_agent.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 2: Tool Discovery éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  # FIX: use always() so this job isn't cascade-skipped when
  # news-crawler is skipped (e.g. when job=tools in workflow_dispatch)
  tool-discovery:
    name: "é¦ƒو”³ Tool Discovery"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '30 0 * * *') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'tools'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [news-crawler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python tool_discovery.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 3: SEO Article Generator éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  seo-articles:
    name: "é‰په¶ڈç¬چ SEO Articles"
    if: |
      always() && (
        (github.event_name == 'schedule' && (github.event.schedule == '0 2 * * *' || github.event.schedule == '0 6 * * *' || github.event.schedule == '0 12 * * *' || github.event.schedule == '0 18 * * *')) ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'seo'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [news-crawler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python seo_article_generator.py
        env:
          SEO_ACTIONS_PER_RUN: "8"

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 4: Compare Article Generator éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  compare-articles:
    name: "éˆ؟و µç¬چ Compare Articles"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'compare'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [news-crawler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python compare_article_generator.py
        env:
          COMPARE_ACTIONS_PER_RUN: "5"

  indexnow-submit:
    name: "IndexNow Submit"
    if: |
      always() && (
        (github.event_name == 'schedule' && (github.event.schedule == '30 2 * * *' || github.event.schedule == '30 6 * * *' || github.event.schedule == '30 12 * * *' || github.event.schedule == '30 18 * * *')) ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'indexnow'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python indexnow_submitter.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 5: Analytics Collector éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  analytics:
    name: "é¦ƒوگ³ Analytics Collector"
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 20 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'analytics'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python analytics_collector.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 4b: China-access Agent éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  # Manual-only. China accessibility is useful context, but not a growth
  # bottleneck while traffic and affiliate coverage are still early.
  lookback-agent:
    name: "é¦ƒو•ھ Lookback Agent"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '10 20 * * *') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'lookback'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [analytics]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python lookback_agent.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 5b: Monitor Agent éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  # Watches system state (monetization gaps, etc.) and surfaces fixable
  # problems into action_queue as flag_for_review items.
  monitor-agent:
    name: "é¦ƒâ”– Monitor Agent"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '20 20 * * *') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'monitor'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [analytics]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python monitor_agent.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 6: Strategy Engine éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  # FIX: same always() pattern so it runs independently via job=strategy
  strategy-engine:
    name: "é¦ƒî‌¥ Strategy Engine"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '30 20 * * *') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'strategy'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [analytics]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python strategy_engine.py

  traffic-growth:
    name: "Traffic Growth Agent"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '35 20 * * *') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'growth'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [analytics]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python traffic_growth_agent.py

  # System-level self-iteration: recovers stale queue items, turns recurring
  # errors into durable actions, and flags throughput gaps.
  self-iteration:
    name: "Self Iteration Agent"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '40 20 * * *') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'self'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [analytics, strategy-engine, traffic-growth]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python self_iteration_agent.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 7: Daily Report éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  daily-report:
    name: "é¦ƒوگµ Daily Report éˆ«?Feishu"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 21 * * *') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'report'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [seo-articles, compare-articles, indexnow-submit, strategy-engine, traffic-growth, self-iteration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python daily_report.py

  # éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Job 8: Weekly Report éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬
  weekly-report:
    name: "é¦ƒوگ± Weekly Report éˆ«?Feishu"
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 21 * * 1') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'weekly'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [daily-report]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python weekly_report.py

  ops-heartbeat:
    name: "Ops Heartbeat to Feishu"
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - news-crawler
      - trend-agent
      - tool-discovery
      - seo-articles
      - compare-articles
      - indexnow-submit
      - analytics
      - lookback-agent
      - monitor-agent
      - strategy-engine
      - traffic-growth
      - self-iteration
      - daily-report
      - weekly-report
    steps:
      - name: Send Feishu heartbeat
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          WORKFLOW: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.getenv("FEISHU_WEBHOOK_URL")
          if not webhook:
              print("FEISHU_WEBHOOK_URL not configured; heartbeat skipped")
              raise SystemExit(0)

          schedule = os.getenv("EVENT_SCHEDULE") or "manual"
          content = "\n".join([
              f"**Workflow:** {os.getenv('WORKFLOW')}",
              f"**Trigger:** {os.getenv('EVENT_NAME')} / {schedule}",
              f"**Run:** {os.getenv('RUN_ID')} attempt {os.getenv('RUN_ATTEMPT')}",
              f"**Status:** workflow reached heartbeat job",
              f"**URL:** {os.getenv('RUN_URL')}",
          ])
          payload = {
              "msg_type": "interactive",
              "card": {
                  "header": {
                      "title": {"tag": "plain_text", "content": "jilo.ai è‡ھهٹ¨ه¢‍é•؟وµپو°´ç؛؟ه؟ƒè·³"},
                      "template": "green",
                  },
                  "elements": [{"tag": "markdown", "content": content}],
              },
          }
          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=10) as resp:
              print(resp.status, resp.read().decode("utf-8", errors="ignore"))
          PY
