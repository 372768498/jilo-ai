# .github/workflows/daily-ops.yml
name: Daily Ops Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 - News crawler
    - cron: '0 5 * * *'   # UTC 05:00 - Daily report
    - cron: '30 0 * * *'  # UTC 00:30 - Tool discovery
    - cron: '0 2 * * *'   # UTC 02:00 - SEO articles
    - cron: '0 2 * * 1,4' # UTC 02:00 Mon,Thu - Compare articles
    - cron: '0 4 * * *'   # UTC 04:00 - Analytics collection
    - cron: '30 4 * * *'  # UTC 04:30 - L2 strategy engine
    - cron: '0 5 * * 1'   # UTC 05:00 Monday - Weekly report
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - news
          - report
          - tools
          - seo
          - compare
          - analytics
          - strategy
          - weekly

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

jobs:
  news-crawler:
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'news'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python rss_news_crawler.py

  daily-report:
    if: github.event.schedule == '0 5 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'report'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python daily_report.py

  tool-discovery:
    if: github.event.schedule == '30 0 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'tools'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: news-crawler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python tool_discovery.py

  seo-articles:
    if: github.event.schedule == '0 2 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'seo'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: news-crawler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python seo_article_generator.py

  compare-articles:
    if: github.event.schedule == '0 2 * * 1,4' || github.event.inputs.job == 'all' || github.event.inputs.job == 'compare'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: news-crawler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python compare_article_generator.py

  analytics:
    if: github.event.schedule == '0 4 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'analytics'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python analytics_collector.py

  strategy-engine:
    if: github.event.schedule == '30 4 * * *' || github.event.inputs.job == 'all' || github.event.inputs.job == 'strategy'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python strategy_engine.py

  weekly-report:
    if: github.event.schedule == '0 5 * * 1' || github.event.inputs.job == 'all' || github.event.inputs.job == 'weekly'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python weekly_report.py
