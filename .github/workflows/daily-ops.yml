# .github/workflows/daily-ops.yml
name: Daily Ops Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 - News crawler
    - cron: '30 0 * * *'  # UTC 00:30 - Tool discovery
    - cron: '0 2 * * *'   # UTC 02:00 - SEO articles
    - cron: '0 2 * * 1,4' # UTC 02:00 Mon,Thu - Compare articles
    - cron: '0 4 * * *'   # UTC 04:00 - Analytics collection
    - cron: '30 4 * * *'  # UTC 04:30 - Strategy engine
    - cron: '0 5 * * *'   # UTC 05:00 - Daily report
    - cron: '0 5 * * 1'   # UTC 05:00 Monday - Weekly report
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - news
          - tools
          - seo
          - compare
          - analytics
          - strategy
          - report
          - weekly

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

jobs:
  # ─── Job 1: News Crawler ───────────────────────────────────────
  news-crawler:
    name: "📰 News Crawler"
    if: |
      github.event.schedule == '0 0 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'news'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python rss_news_crawler.py

  # ─── Job 2: Tool Discovery ─────────────────────────────────────
  # FIX: use always() so this job isn't cascade-skipped when
  # news-crawler is skipped (e.g. when job=tools in workflow_dispatch)
  tool-discovery:
    name: "🔍 Tool Discovery"
    if: |
      always() && (
        github.event.schedule == '30 0 * * *' ||
        github.event.inputs.job == 'all' ||
        github.event.inputs.job == 'tools'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [news-crawler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python tool_discovery.py

  # ─── Job 3: SEO Article Generator ─────────────────────────────
  seo-articles:
    name: "✍️ SEO Articles"
    if: |
      always() && (
        github.event.schedule == '0 2 * * *' ||
        github.event.inputs.job == 'all' ||
        github.event.inputs.job == 'seo'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [news-crawler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python seo_article_generator.py

  # ─── Job 4: Compare Article Generator ─────────────────────────
  compare-articles:
    name: "⚖️ Compare Articles"
    if: |
      always() && (
        github.event.schedule == '0 2 * * 1,4' ||
        github.event.inputs.job == 'all' ||
        github.event.inputs.job == 'compare'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [news-crawler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python compare_article_generator.py

  # ─── Job 5: Analytics Collector ───────────────────────────────
  analytics:
    name: "📊 Analytics Collector"
    if: |
      github.event.schedule == '0 4 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'analytics'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python analytics_collector.py

  # ─── Job 6: Strategy Engine ────────────────────────────────────
  # FIX: same always() pattern so it runs independently via job=strategy
  strategy-engine:
    name: "🧠 Strategy Engine"
    if: |
      always() && (
        github.event.schedule == '30 4 * * *' ||
        github.event.inputs.job == 'all' ||
        github.event.inputs.job == 'strategy'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [analytics]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python strategy_engine.py

  # ─── Job 7: Daily Report ──────────────────────────────────────
  daily-report:
    name: "📋 Daily Report → Feishu"
    if: |
      always() && (
        github.event.schedule == '0 5 * * *' ||
        github.event.inputs.job == 'all' ||
        github.event.inputs.job == 'report'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [seo-articles, compare-articles, strategy-engine]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python daily_report.py

  # ─── Job 8: Weekly Report ─────────────────────────────────────
  weekly-report:
    name: "📈 Weekly Report → Feishu"
    if: |
      always() && (
        github.event.schedule == '0 5 * * 1' ||
        github.event.inputs.job == 'all' ||
        github.event.inputs.job == 'weekly'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [daily-report]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r crawler/requirements.txt
      - run: cd crawler && python weekly_report.py
